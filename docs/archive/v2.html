<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Zuok Uncensored</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#03030A;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
::-webkit-scrollbar{width:0;display:none}

@keyframes zFadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes zFadeIn{from{opacity:0}to{opacity:1}}
@keyframes zPulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.18);opacity:0.18}}
@keyframes zOrb{0%,100%{box-shadow:0 0 50px 12px rgba(200,20,40,0.5),0 0 100px 30px rgba(200,20,40,0.2)}50%{box-shadow:0 0 80px 24px rgba(232,53,72,0.65),0 0 140px 50px rgba(232,53,72,0.28)}}
@keyframes zFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes zRipple{0%{transform:scale(1);opacity:0.55}100%{transform:scale(2.8);opacity:0}}
@keyframes zDot{0%,60%,100%{transform:scale(0.65);opacity:0.3}30%{transform:scale(1);opacity:1}}
@keyframes zWave{0%,100%{transform:scaleY(0.25)}50%{transform:scaleY(1)}}
@keyframes zSlideUp{from{transform:translateY(100%);opacity:0}to{transform:none;opacity:1}}
@keyframes zSlideIn{from{transform:translateX(100%)}to{transform:none}}
@keyframes zSlideOut{from{transform:none}to{transform:translateX(-60px);opacity:0}}
@keyframes zBlink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes zSpinSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes zParticle{0%{opacity:0.9;transform:translateY(0) translateX(0) scale(1)}100%{opacity:0;transform:translateY(-180px) translateX(var(--drift,0px)) scale(0.3)}}
@keyframes zStream{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes zShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes zScreenPush{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
@keyframes zScreenPop{from{transform:none;opacity:1}to{transform:translateX(100%);opacity:0}}
@keyframes zGlowPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(200,20,40,0.7))}50%{filter:drop-shadow(0 0 18px rgba(232,53,72,1))}}
@keyframes zModelIn{from{transform:translateY(100%)}to{transform:none}}
@keyframes zVoiceBar{0%,100%{transform:scaleY(0.2)}50%{transform:scaleY(1)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">
// ─── Design tokens ───────────────────────────────────────
const ZK = {
  bg:'#060608',
  card:'#0E0E11',
  card2:'#161619',
  border:'rgba(200,20,35,0.16)',
  borderBright:'rgba(220,30,45,0.45)',
  accent:'#C81428',
  accentL:'#E83548',
  accentD:'#8A0A1A',
  accentGrad:'linear-gradient(135deg,#8A0A1A 0%,#C81428 55%,#E83548 100%)',
  accentGlow:'rgba(200,20,40,0.32)',
  silver:'#A8A8B2',
  silverL:'#D2D2DC',
  silverGrad:'linear-gradient(135deg,#4E4E58 0%,#C0C0CC 45%,#8A8A96 100%)',
  silverBorder:'rgba(192,192,204,0.22)',
  text:'#F2F2F6',
  muted:'rgba(242,242,246,0.5)',
  subtle:'rgba(242,242,246,0.13)',
  dim:'rgba(242,242,246,0.06)',
  danger:'#E83548',
  fontD:'"Cormorant Garamond",Georgia,serif',
  fontB:'"DM Sans",system-ui,sans-serif',
};

// ─── Shared UI atoms ─────────────────────────────────────
function ZuokOrb({size=56,style={},glow=true}){
  return(
    <div style={{width:size,height:size,borderRadius:'50%',position:'relative',flexShrink:0,...style}}>
      {glow&&<div style={{position:'absolute',inset:-8,borderRadius:'50%',background:`radial-gradient(circle,${ZK.accentGlow} 0%,transparent 70%)`,animation:'zPulse 2.4s ease-in-out infinite'}}/>}
      <div style={{position:'absolute',inset:0,borderRadius:'50%',background:'linear-gradient(145deg,#1A0608 0%,#2A0810 50%,#120406 100%)',animation:glow?'zOrb 2.4s ease-in-out infinite':'none',border:`1px solid ${ZK.borderBright}`}}/>
      <div style={{position:'absolute',inset:'25%',borderRadius:'50%',background:`radial-gradient(circle,${ZK.silverL} 0%,${ZK.accentL} 45%,${ZK.accent} 80%,transparent 100%)`,filter:'blur(3px)'}}/>
      <div style={{position:'absolute',inset:0,borderRadius:'50%',background:'radial-gradient(circle at 35% 30%,rgba(255,255,255,0.18) 0%,transparent 55%)'}}/>
    </div>
  );
}

function ZuokBtn({children,onTap,variant='primary',style={}}){
  const [pressed,setPressed]=React.useState(false);
  const base={
    display:'flex',alignItems:'center',justifyContent:'center',
    borderRadius:16,padding:'14px 28px',cursor:'pointer',
    fontFamily:ZK.fontB,fontSize:15,fontWeight:600,letterSpacing:0.3,
    transition:'all 0.15s',transform:pressed?'scale(0.97)':'scale(1)',
    userSelect:'none',
  };
  const variants={
    primary:{background:ZK.accentGrad,color:'#fff',boxShadow:`0 4px 28px ${ZK.accentGlow}`},
    ghost:{background:'transparent',color:ZK.silverL,border:`1px solid ${ZK.silverBorder}`},
    gold:{background:ZK.silverGrad,color:'#fff',boxShadow:'0 4px 20px rgba(192,192,204,0.25)'},
    subtle:{background:ZK.dim,color:ZK.muted,border:`1px solid ${ZK.subtle}`},
  };
  return(
    <div style={{...base,...variants[variant],...style}}
      onPointerDown={()=>setPressed(true)}
      onPointerUp={()=>{setPressed(false);onTap&&onTap()}}
      onPointerLeave={()=>setPressed(false)}
    >{children}</div>
  );
}

function ZuokInput({value,onChange,onSend,placeholder='Message Zuok...'}){
  const [focused,setFocused]=React.useState(false);
  return(
    <div style={{display:'flex',alignItems:'flex-end',gap:10,padding:'12px 16px',background:ZK.card,borderTop:`1px solid ${ZK.border}`}}>
      <div style={{flex:1,background:ZK.card2,borderRadius:20,border:`1px solid ${focused?ZK.borderBright:ZK.border}`,transition:'border 0.2s',padding:'10px 16px',display:'flex',alignItems:'center',gap:8}}>
        <input
          value={value} onChange={e=>onChange(e.target.value)}
          onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}
          placeholder={placeholder}
          style={{flex:1,background:'transparent',border:'none',outline:'none',color:ZK.text,fontFamily:ZK.fontB,fontSize:15,caretColor:ZK.accentL,placeholder:'rgba(200,200,200,0.4)'}}
        />
        <div style={{color:ZK.muted,cursor:'pointer',flexShrink:0}} onClick={()=>{}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M12 2a3 3 0 013 3v7a3 3 0 01-6 0V5a3 3 0 013-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
        </div>
      </div>
      <div onClick={onSend} style={{width:42,height:42,borderRadius:'50%',background:value.trim()?ZK.accentGrad:ZK.dim,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all 0.2s',flexShrink:0,boxShadow:value.trim()?`0 2px 14px ${ZK.accentGlow}`:'none'}}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={value.trim()?'#fff':ZK.subtle} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </div>
    </div>
  );
}

function ThinkingDots(){
  return(
    <div style={{display:'flex',alignItems:'center',gap:5,padding:'14px 16px',background:ZK.card2,borderRadius:'18px 18px 18px 4px',width:'fit-content'}}>
      {[0,1,2].map(i=>(
        <div key={i} style={{width:7,height:7,borderRadius:'50%',background:ZK.accentL,animation:`zDot 1.2s ease-in-out ${i*0.2}s infinite`}}/>
      ))}
    </div>
  );
}

// ─── SCREEN: Splash ──────────────────────────────────────
function SplashScreen({onDone}){
  const canvasRef=React.useRef(null);
  const [show,setShow]=React.useState(false);
  const [showSub,setShowSub]=React.useState(false);
  const [showTap,setShowTap]=React.useState(false);

  React.useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    canvas.width=402;canvas.height=874;
    const particles=Array.from({length:55},()=>({
      x:Math.random()*402,y:600+Math.random()*274,
      vx:(Math.random()-0.5)*0.5,vy:-(0.4+Math.random()*0.8),
      r:Math.random()*1.5+0.5,life:Math.random(),
    }));
    let raf;
    const draw=()=>{
      ctx.clearRect(0,0,402,874);
      particles.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;p.life-=0.004;
        if(p.life<=0){p.x=Math.random()*402;p.y=874;p.life=0.8+Math.random()*0.2;}
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        const alpha=Math.min(p.life,0.6);
        const hue=0+Math.random()*20;
        ctx.fillStyle=`hsla(${hue},80%,55%,${alpha})`;ctx.fill();
      });
      raf=requestAnimationFrame(draw);
    };
    draw();
    return()=>cancelAnimationFrame(raf);
  },[]);

  React.useEffect(()=>{
    const t1=setTimeout(()=>setShow(true),300);
    const t2=setTimeout(()=>setShowSub(true),600);
    const t3=setTimeout(()=>setShowTap(true),1400);
    const t4=setTimeout(onDone,3400);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);clearTimeout(t4);};
  },[]);

  const fadeStyle=(visible,delay=0)=>({
    opacity:visible?1:0,
    transform:visible?'none':'translateY(20px)',
    transition:`opacity 0.7s ease ${delay}ms, transform 0.7s ease ${delay}ms`,
  });

  return(
    <div style={{position:'absolute',inset:0,background:ZK.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',overflow:'hidden',cursor:'pointer'}} onClick={onDone}>
      <canvas ref={canvasRef} style={{position:'absolute',inset:0,pointerEvents:'none'}}/>
      <div style={{position:'absolute',top:'30%',left:'50%',transform:'translate(-50%,-50%)',width:300,height:300,borderRadius:'50%',background:'radial-gradient(circle,rgba(200,20,35,0.22) 0%,transparent 70%)',pointerEvents:'none'}}/>
      {/* orb */}
      <div style={{position:'relative',marginBottom:32,animation:'zFloat 3s ease-in-out infinite'}}>
        <div style={{position:'absolute',inset:-20,borderRadius:'50%',background:`radial-gradient(circle,rgba(200,20,35,0.18) 0%,transparent 70%)`,animation:'zRipple 2s ease-out infinite'}}/>
        <div style={{position:'absolute',inset:-30,borderRadius:'50%',background:`radial-gradient(circle,rgba(200,20,35,0.1) 0%,transparent 70%)`,animation:'zRipple 2s ease-out 0.5s infinite'}}/>
        <ZuokOrb size={88} glow={true}/>
      </div>
      {/* title */}
      <div style={fadeStyle(show)}>
        <div style={{fontFamily:ZK.fontD,fontSize:62,fontWeight:300,color:ZK.text,letterSpacing:18,textAlign:'center',lineHeight:1}}>ZUOK</div>
      </div>
      <div style={{...fadeStyle(showSub),marginTop:8}}>
        <div style={{fontFamily:ZK.fontB,fontSize:10,fontWeight:500,color:ZK.silver,letterSpacing:7,textAlign:'center'}}>UNCENSORED</div>
      </div>
      <div style={{...fadeStyle(showSub),width:40,height:1,background:`linear-gradient(90deg,transparent,${ZK.accent},transparent)`,margin:'28px auto 0'}}/>
      <div style={{position:'absolute',bottom:80,...fadeStyle(showTap)}}>
        <span style={{fontFamily:ZK.fontB,fontSize:12,color:ZK.silver,letterSpacing:2}}>tap to enter</span>
      </div>
    </div>
  );
}

// ─── SCREEN: Onboarding ──────────────────────────────────
const ONBOARDING_SLIDES=[
  {
    icon:<svg width="52" height="52" viewBox="0 0 52 52" fill="none"><circle cx="26" cy="26" r="25" stroke="#C81428" strokeWidth="1.5"/><path d="M18 26l5 5 11-11" stroke="#E83548" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    title:'No Limits',
    sub:'Uncensored',
    body:'Zuok speaks freely — no guardrails, no filters. Just raw, uncompromising intelligence at your fingertips.',
  },
  {
    icon:<svg width="52" height="52" viewBox="0 0 52 52" fill="none"><rect x="14" y="10" width="24" height="32" rx="4" stroke="#C9A84C" strokeWidth="1.5"/><path d="M20 20h12M20 26h8" stroke="#C9A84C" strokeWidth="1.5" strokeLinecap="round"/><circle cx="26" cy="36" r="2" fill="#C9A84C"/></svg>,
    title:'Zero Trace',
    sub:'Private by Design',
    body:'Your conversations exist only in the moment. No logs, no training, no memory. Deleted when you leave.',
  },
  {
    icon:<svg width="52" height="52" viewBox="0 0 52 52" fill="none"><polygon points="26,8 32,20 46,22 36,32 38,46 26,40 14,46 16,32 6,22 20,20" stroke="#C81428" strokeWidth="1.5" fill="none"/><circle cx="26" cy="26" r="5" fill="#C81428" opacity="0.7"/></svg>,
    title:'Supercharged',
    sub:'Premium Intelligence',
    body:'Access the world\'s most powerful reasoning models — fine-tuned for truth, creativity, and precision.',
  },
];

function OnboardingScreen({onDone}){
  const [idx,setIdx]=React.useState(0);
  const [visible,setVisible]=React.useState(true);
  const s=ONBOARDING_SLIDES[idx];
  const last=idx===ONBOARDING_SLIDES.length-1;

  const goTo=(i)=>{
    setVisible(false);
    setTimeout(()=>{setIdx(i);setVisible(true);},220);
  };

  return(
    <div style={{position:'absolute',inset:0,background:ZK.bg,display:'flex',flexDirection:'column',paddingTop:70}}>
      {/* bg glow */}
      <div style={{position:'absolute',top:'40%',left:'50%',transform:'translate(-50%,-50%)',width:280,height:280,borderRadius:'50%',background:'radial-gradient(circle,rgba(200,20,35,0.12) 0%,transparent 70%)',pointerEvents:'none'}}/>
      {/* skip */}
      {!last&&<div style={{position:'absolute',top:80,right:24,fontFamily:ZK.fontB,fontSize:13,color:ZK.muted,cursor:'pointer'}} onClick={onDone}>Skip</div>}
      {/* content */}
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 36px',opacity:visible?1:0,transform:visible?'none':'translateY(16px)',transition:'opacity 0.22s ease, transform 0.22s ease'}}>
        {/* icon bg */}
        <div style={{width:100,height:100,borderRadius:'50%',background:'radial-gradient(circle,rgba(200,20,35,0.1) 0%,transparent 65%)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:36,border:`1px solid ${ZK.border}`}}>
          {s.icon}
        </div>
        <div style={{fontFamily:ZK.fontB,fontSize:11,fontWeight:500,color:ZK.silver,letterSpacing:5,marginBottom:12,textTransform:'uppercase'}}>{s.sub}</div>
        <div style={{fontFamily:ZK.fontD,fontSize:44,fontWeight:400,color:ZK.text,textAlign:'center',lineHeight:1.1,marginBottom:20}}>{s.title}</div>
        <div style={{fontFamily:ZK.fontB,fontSize:15,color:ZK.muted,textAlign:'center',lineHeight:1.7,maxWidth:280}}>{s.body}</div>
      </div>
      {/* dots */}
      <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:28}}>
        {ONBOARDING_SLIDES.map((_,i)=>(
          <div key={i} onClick={()=>goTo(i)} style={{width:i===idx?24:7,height:7,borderRadius:4,background:i===idx?ZK.accent:ZK.subtle,transition:'all 0.3s',cursor:'pointer'}}/>
        ))}
      </div>
      {/* cta */}
      <div style={{padding:'0 24px 50px'}}>
        <ZuokBtn variant={last?'gold':'primary'} onTap={()=>last?onDone():goTo(idx+1)} style={{width:'100%',fontSize:16,padding:'16px'}}>
          {last?'Enter Zuok →':'Continue'}
        </ZuokBtn>
      </div>
    </div>
  );
}

// ─── SCREEN: Home ────────────────────────────────────────
const CHATS=[
  {id:1,name:'Creative Writing',last:'Give me a dark short story with no...',time:'now',unread:0,model:'Prime'},
  {id:2,name:'Market Analysis',last:'The global AI chip market is projected...',time:'2m',unread:2,model:'Vision'},
  {id:3,name:'Code Session',last:'Here\'s the fixed recursive function...',time:'18m',unread:0,model:'Code'},
  {id:4,name:'Uncensored Q&A',last:'Without any filters, the reality is...',time:'1h',unread:0,model:'Uncensored'},
  {id:5,name:'Strategy Session',last:'Your competitor\'s key weakness is...',time:'3h',unread:0,model:'Prime'},
  {id:6,name:'Deep Research',last:'Based on 47 sources, here\'s what...',time:'1d',unread:0,model:'Vision'},
];

function HomeScreen({onChat,onSettings,onModel}){
  const [search,setSearch]=React.useState('');
  const filtered=CHATS.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
  return(
    <div style={{position:'absolute',inset:0,background:ZK.bg,display:'flex',flexDirection:'column',paddingTop:60}}>
      {/* header */}
      <div style={{padding:'20px 20px 0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontFamily:ZK.fontB,fontSize:11,color:ZK.silver,letterSpacing:4,fontWeight:500}}>ZUOK</div>
          <div style={{fontFamily:ZK.fontD,fontSize:30,fontWeight:400,color:ZK.text,marginTop:2}}>Conversations</div>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <div onClick={onModel} style={{width:36,height:36,borderRadius:'50%',background:ZK.dim,border:`1px solid ${ZK.border}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={ZK.muted} strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          </div>
          <div onClick={onSettings} style={{cursor:'pointer'}}>
            <div style={{width:34,height:34,borderRadius:'50%',background:`linear-gradient(135deg,${ZK.accentD},${ZK.accent})`,display:'flex',alignItems:'center',justifyContent:'center',border:`1.5px solid ${ZK.accentL}`}}>
              <span style={{fontFamily:ZK.fontD,fontSize:16,fontWeight:600,color:'#fff'}}>A</span>
            </div>
          </div>
        </div>
      </div>
      {/* search */}
      <div style={{padding:'16px 20px 0'}}>
        <div style={{background:ZK.card,borderRadius:14,border:`1px solid ${ZK.border}`,display:'flex',alignItems:'center',gap:10,padding:'10px 14px'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={ZK.muted} strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search conversations..." style={{flex:1,background:'transparent',border:'none',outline:'none',color:ZK.text,fontFamily:ZK.fontB,fontSize:14}}/>
        </div>
      </div>
      {/* new chat */}
      <div style={{padding:'14px 20px 0'}}>
        <ZuokBtn variant='primary' onTap={()=>onChat(null)} style={{width:'100%',gap:8,fontSize:15}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Conversation
        </ZuokBtn>
      </div>
      {/* chat list */}
      <div style={{flex:1,overflowY:'auto',paddingTop:12}}>
        <div style={{padding:'0 12px',fontFamily:ZK.fontB,fontSize:10,fontWeight:600,color:ZK.muted,letterSpacing:3,marginBottom:8,paddingLeft:20}}>RECENT</div>
        {filtered.map((c,i)=>(
          <div key={c.id} onClick={()=>onChat(c)}
            style={{display:'flex',alignItems:'center',gap:12,padding:'12px 20px',cursor:'pointer',borderBottom:`1px solid ${ZK.dim}`}}
          >
            <ZuokOrb size={44} glow={false}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                <span style={{fontFamily:ZK.fontB,fontSize:15,fontWeight:600,color:ZK.text}}>{c.name}</span>
                <span style={{fontFamily:ZK.fontB,fontSize:11,color:ZK.muted}}>{c.time}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontFamily:ZK.fontB,fontSize:13,color:ZK.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}>{c.last}</span>

const LS_KEY='zuok_screen';

function ZuokApp(){
  const saved=localStorage.getItem(LS_KEY);
  const [screen,setScreen]=React.useState(saved||'splash');
  const [prevScreen,setPrev]=React.useState(null);
  const [activeChat,setActiveChat]=React.useState(null);
  const [selectedModel,setSelectedModel]=React.useState('uncensored');
  const [showModel,setShowModel]=React.useState(false);

  const go=React.useCallback((s)=>{
    setPrev(screen);
    setScreen(s);
    localStorage.setItem(LS_KEY,s);
  },[screen]);

  React.useEffect(()=>{ window.zuokGo=go; },[go]);

  const renderScreen=()=>{
    if(screen==='splash')return<SplashScreen onDone={()=>go('onboarding')}/>;
    if(screen==='onboarding')return<OnboardingScreen onDone={()=>go('home')}/>;
    if(screen==='home')return<HomeScreen onChat={c=>{setActiveChat(c);go('chat');}} onSettings={()=>go('settings')} onModel={()=>setShowModel(true)}/>;
    if(screen==='chat')return<ChatScreen chat={activeChat} onBack={()=>go('home')} onVoice={()=>go('voice')} onModel={()=>setShowModel(true)}/>;
    if(screen==='voice')return<VoiceScreen onClose={()=>go(prevScreen||'chat')}/>;
    if(screen==='settings')return<SettingsScreen onBack={()=>go('home')}/>;
    return null;
  };

  return(
    <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center',width:'100vw',height:'100vh',background:'#060608'}}>
      <IOSDevice width={402} height={874} dark={true}>
        <div style={{position:'relative',width:'100%',height:'100%',background:ZK.bg,overflow:'hidden'}}>
          <div key={screen} style={{position:'absolute',inset:0,animation:screen!=='splash'&&screen!=='onboarding'?'zScreenPush 0.35s cubic-bezier(0.32,0.72,0,1) both':'none'}}>
            {renderScreen()}
          </div>
          {showModel&&(
            <ModelScreen current={selectedModel} onSelect={id=>{setSelectedModel(id);setShowModel(false);}} onClose={()=>setShowModel(false)}/>
          )}
        </div>
      </IOSDevice>

      {/* Tweaks panel */}
      <ZuokTweaks screen={screen} onJump={go}/>
    </div>
  );
}

// ─── Tweaks ───────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#C81428",
  "silverColor": "#A8A8B2",
  "fontDisplay": "Cormorant Garamond"
}/*EDITMODE-END*/;

function ZuokTweaks({screen,onJump}){
  const [open,setOpen]=React.useState(false);

  React.useEffect(()=>{
    const handler=(e)=>{
      if(e.data?.type==='__activate_edit_mode')setOpen(true);
      if(e.data?.type==='__deactivate_edit_mode')setOpen(false);
    };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',handler);
  },[]);

  if(!open)return null;

  const SCREENS_NAV=[
    {id:'splash',label:'Splash'},
    {id:'onboarding',label:'Onboarding'},
    {id:'home',label:'Home'},
    {id:'chat',label:'Chat'},
    {id:'voice',label:'Voice'},
    {id:'settings',label:'Settings'},
  ];

  return(
    <div style={{position:'fixed',bottom:24,right:24,width:200,background:'#0D0D1A',border:'1px solid rgba(200,20,40,0.3)',borderRadius:16,padding:16,zIndex:9999,boxShadow:'0 8px 32px rgba(0,0,0,0.6)',fontFamily:'"DM Sans",sans-serif'}}>
      <div style={{fontSize:11,fontWeight:600,color:'#C9A84C',letterSpacing:3,marginBottom:12}}>TWEAKS</div>
      <div style={{fontSize:11,color:'rgba(238,234,248,0.5)',marginBottom:8,letterSpacing:1}}>JUMP TO SCREEN</div>
      <div style={{display:'flex',flexDirection:'column',gap:5}}>
        {SCREENS_NAV.map(s=>(
          <div key={s.id} onClick={()=>onJump(s.id)}
            style={{padding:'7px 10px',borderRadius:8,background:screen===s.id?'rgba(200,20,40,0.25)':'rgba(238,234,248,0.05)',border:`1px solid ${screen===s.id?'rgba(200,20,40,0.5)':'transparent'}`,color:screen===s.id?'#E83548':'rgba(242,242,246,0.6)',fontSize:13,cursor:'pointer',fontWeight:screen===s.id?600:400}}>
            {s.label}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ZuokApp/>);
</script>
</body>
